services:
  layra:
    image: ghcr.io/liweiphys/layra:latest
    container_name: layra
    ports:
      - "3000:3000"
    volumes:
      - layra_data:/app/data
      - layra_indexes:/app/indexes
    environment:
      - MODEL_BASE_URL=https://openrouter.ai/api/v1
      - MODEL_API_KEY=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
      - LLM_MODEL=qwen/qwen3-vl-32b-instruct          # or qwen/qwen3-vl-30b-a3b-instruct
      - EMBEDDING_MODEL=vidore/colqwen2.5-v0.2
      - EMBEDDING_DPI=150
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia   # remove this whole block if you want pure CPU
              count: all
              capabilities: [gpu]

volumes:
  layra_data:
  layra_indexes: